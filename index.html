<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MED REACH 2026 — Eli Lilly</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Quicksand:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── RESET & BASE ── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0f172a;--bg:#f1f5f9;--white:#ffffff;
  --muted:#64748b;--border:#e2e8f0;--border2:#cbd5e1;
  --green:#16a34a;--green-bg:#f0fdf4;--green-border:#bbf7d0;
  --amber:#b45309;--amber-bg:#fef3c7;--amber-border:#fde68a;
  --blue:#1d4ed8;--blue-bg:#dbeafe;--blue-border:#bfdbfe;
  --red:#dc2626;--red-bg:#fee2e2;--red-border:#fecaca;
  --purple:#6d28d9;--purple-bg:#ede9fe;--purple-border:#c4b5fd;
  --lilly:#cc2222;
  --radius:10px;
}
html,body{height:100%}
body{font-family:'Quicksand',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
button,input,select,textarea{font-family:'Quicksand',sans-serif;font-size:14px}
button{cursor:pointer}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

/* ── LAYOUT ── */
.shell{display:flex;flex-direction:column;min-height:100vh}
.main-content{padding:28px 32px;flex:1}
.container{max-width:1400px;margin:0 auto}

/* ── HEADER ── */
.header{background:var(--ink);padding:20px 32px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.hd-eye{font-family:'Quicksand',sans-serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:4px}
.hd-title{font-family:'Nunito',sans-serif;font-size:26px;font-weight:700;color:#fff;line-height:1}
.hd-sub{font-size:13px;color:rgba(255,255,255,.45);margin-top:3px}
.hd-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:600;border:none;transition:all .15s;line-height:1;white-space:nowrap}
.btn-primary{background:var(--lilly);color:#fff}.btn-primary:hover{filter:brightness(1.1)}
.btn-ghost{background:rgba(255,255,255,.08);color:rgba(255,255,255,.75);border:1px solid rgba(255,255,255,.18)}.btn-ghost:hover{background:rgba(255,255,255,.15)}
.btn-outline{background:var(--white);color:var(--ink);border:1.5px solid var(--border)}.btn-outline:hover{background:var(--bg)}
.btn-purple{background:#7c3aed;color:#fff}.btn-purple:hover{filter:brightness(1.1)}
.btn-red{background:var(--red-bg);color:var(--red);border:1.5px solid var(--red-border)}.btn-red:hover{background:var(--red-border)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-xs{padding:4px 10px;font-size:11px}

/* ── NAV TABS ── */
.nav-bar{background:var(--white);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:stretch;justify-content:space-between}
.nav-left{display:flex}
.nav-tab{padding:15px 22px;border:none;border-bottom:3px solid transparent;background:none;font-size:14px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px;font-family:'Nunito',sans-serif;white-space:nowrap}
.nav-tab.active{color:var(--lilly);border-bottom-color:var(--lilly);font-weight:700}
.nav-tab:hover:not(.active){color:var(--ink)}
.tab-count{font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;background:var(--bg);color:var(--muted)}
.nav-tab.active .tab-count{background:var(--red-bg);color:var(--lilly)}
.nav-right{display:flex;align-items:stretch}
.nav-stat{padding:8px 18px;border-left:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;text-align:center}
.ns-val{font-family:'Nunito',sans-serif;font-size:18px;font-weight:700;line-height:1}
.ns-lbl{font-size:10px;font-family:'Quicksand',sans-serif;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:2px}
.view-btns{display:flex;align-items:center;gap:6px;padding:0 14px;border-left:1px solid var(--border)}
.vbtn{padding:5px 9px;border:1.5px solid var(--border);border-radius:6px;background:var(--white);font-size:13px;color:var(--muted)}
.vbtn.on{border-color:var(--lilly);background:var(--red-bg);color:var(--lilly)}

/* ── FILTER BAR ── */
.filter-bar{background:var(--white);border-bottom:1px solid var(--border);padding:12px 32px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.filter-bar input,.filter-bar select{padding:8px 13px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;outline:none;background:var(--white);color:var(--ink);transition:border-color .15s}
.filter-bar input:focus,.filter-bar select:focus{border-color:var(--lilly)}
.filter-count{margin-left:auto;font-size:12px;color:var(--muted);font-family:'Quicksand',sans-serif}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;font-size:12px;font-weight:700;line-height:1;white-space:nowrap}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.b-done{background:var(--green-bg);color:var(--green)}.b-done .dot{background:var(--green)}
.b-prog{background:var(--amber-bg);color:var(--amber)}.b-prog .dot{background:#f59e0b}
.b-plan{background:var(--blue-bg);color:var(--blue)}.b-plan .dot{background:#3b82f6}
.b-late{background:var(--red-bg);color:var(--red)}.b-late .dot{background:var(--red)}
.b-pause{background:var(--purple-bg);color:var(--purple)}.b-pause .dot{background:#8b5cf6}
.prio{padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;border:1.5px solid}
.p-crit{color:#ef4444;border-color:#ef4444}
.p-alta{color:#f59e0b;border-color:#f59e0b}
.p-med{color:#3b82f6;border-color:#3b82f6}
.p-low{color:var(--muted);border-color:var(--border2)}
.dl-badge{font-size:12px;font-weight:600}

/* ── AVATAR ── */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0;line-height:1}

/* ── CARDS GRID ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px}
.card{background:var(--white);border-radius:14px;border:1.5px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.04);transition:all .2s;position:relative;overflow:hidden;cursor:pointer}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.09)}
.card-stripe{position:absolute;left:0;top:0;bottom:0;width:4px}
.card-body{padding:18px 18px 16px 22px}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px}
.card-cat{font-size:11px;font-family:'Quicksand',sans-serif;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);background:var(--bg);padding:3px 9px;border-radius:5px;white-space:nowrap}
.card-title{font-family:'Nunito',sans-serif;font-size:16px;font-weight:700;color:var(--ink);margin-bottom:5px;line-height:1.3}
.card-desc{font-size:13px;color:var(--muted);line-height:1.55;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.next-step-box{display:flex;align-items:flex-start;gap:8px;padding:8px 11px;border-radius:8px;margin-bottom:10px}
.ns-crit{background:var(--red-bg);border:1px solid var(--red-border)}
.ns-warn{background:#fffbeb;border:1px solid #fde68a}
.ns-lbl{font-size:10px;font-family:'Quicksand',sans-serif;letter-spacing:.1em;text-transform:uppercase;font-weight:700;margin-bottom:2px}
.ns-txt{font-size:13px;font-weight:600;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pbar-row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:4px}
.pbar{height:7px;background:var(--bg);border-radius:99px;overflow:hidden}
.pfill{height:100%;border-radius:99px;transition:width .4s}
.card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.card-owner{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted)}
.budget-pill{display:flex;align-items:center;gap:5px;padding:5px 10px;background:#eef2ff;border-radius:7px;border:1px solid #c7d2fe;font-size:12px;margin-top:8px}

/* ── TABLE ── */
.tbl-wrap{background:var(--white);border-radius:14px;border:1px solid var(--border);overflow:hidden}
.tbl{width:100%;border-collapse:collapse}
.tbl th{padding:11px 14px;text-align:left;font-size:11px;font-family:'Quicksand',sans-serif;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);background:var(--bg);border-bottom:2px solid var(--border);white-space:nowrap}
.tbl td{padding:12px 14px;border-bottom:1px solid var(--bg);vertical-align:middle;font-size:13px}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:#fafafa;cursor:pointer}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);padding:20px}
.modal{background:var(--white);border-radius:16px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.22)}
.modal-lg{max-width:680px}
.modal-hd{padding:24px 28px 0;display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-hd h2{font-family:'Nunito',sans-serif;font-size:18px;font-weight:700}
.modal-x{background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer;line-height:1;padding:0}
.modal-bd{padding:0 28px 28px}
.fg{margin-bottom:16px}
.fl{font-size:11px;font-family:'Quicksand',sans-serif;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:5px;font-weight:600}
.fc{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;outline:none;background:var(--white);transition:border-color .15s}
.fc:focus{border-color:var(--lilly)}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.mfooter{display:flex;gap:10px;margin-top:20px}

/* ── DETAIL VIEW ── */
.det-hd{background:linear-gradient(135deg,#1e293b,#0f172a);padding:22px 32px;color:#fff}
.det-back{background:rgba(255,255,255,.12);border:none;color:#fff;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;margin-bottom:16px;display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-family:'Nunito',sans-serif;transition:background .15s}
.det-back:hover{background:rgba(255,255,255,.2)}
.det-meta{background:var(--white);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;gap:32px;flex-wrap:wrap}
.dm-lbl{font-size:10px;font-family:'Quicksand',sans-serif;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.dm-val{font-size:14px;font-weight:600;margin-top:2px}
.det-tabs{background:var(--white);border-bottom:1px solid var(--border);padding:0 32px;display:flex}
.det-body{padding:28px 32px}

/* ── SECTION CARD ── */
.sc{background:var(--white);border-radius:12px;padding:22px;border:1px solid var(--border);margin-bottom:18px}
.sc-title{font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.sc-2col{display:grid;grid-template-columns:1fr 1fr;gap:18px}

/* ── STEPS ── */
.step-row{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:9px;border:1.5px solid;margin-bottom:7px;transition:all .15s}
.sr-done{background:var(--green-bg);border-color:var(--green-border)}
.sr-cur{background:var(--purple-bg);border-color:var(--purple-border)}
.sr-def{background:#fafafa;border-color:var(--border)}
.step-chk{width:22px;height:22px;border-radius:7px;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;cursor:pointer;transition:all .15s}
.step-txt{flex:1;font-size:13px;font-weight:600;line-height:1.4}
.step-txt.done{text-decoration:line-through;color:var(--muted);font-weight:400}
.step-owner{font-size:11px;font-family:'Quicksand',sans-serif;padding:3px 8px;border-radius:5px;background:var(--bg);color:var(--muted);white-space:nowrap}

/* ── BUDGET ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.kpi-c{border-radius:12px;padding:16px;border:1px solid transparent}
.kpi-icon{font-size:20px;margin-bottom:7px}
.kpi-val{font-family:'Nunito',sans-serif;font-size:22px;font-weight:700;line-height:1}
.kpi-lbl{font-size:11px;font-family:'Quicksand',sans-serif;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:4px}
.kpi-sub{font-size:12px;font-weight:600;margin-top:4px}
.cat-row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:9px;border:1px solid var(--border);margin-bottom:8px;cursor:pointer;transition:background .15s}
.cat-row:hover{background:var(--bg)}
.cat-row.open{background:#f0f4ff;border-color:#c7d2fe}
.cat-icon{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:700;flex-shrink:0}
.cat-name{flex:1;font-size:13px;font-weight:700}
.line-tbl{width:100%;border-collapse:collapse;font-size:12px}
.line-tbl th{padding:7px 9px;text-align:right;font-size:10px;font-family:'Quicksand',sans-serif;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--border);background:#f0f4ff}
.line-tbl th:first-child,.line-tbl th:nth-child(2){text-align:left}
.line-tbl td{padding:6px 9px;border-bottom:1px solid var(--bg);text-align:right}
.line-tbl td:first-child,.line-tbl td:nth-child(2){text-align:left;font-weight:600;font-size:12px}
.li{width:75px;padding:5px 7px;border:1.5px solid var(--border);border-radius:5px;font-size:12px;text-align:right;outline:none;font-family:'Nunito',sans-serif;transition:border-color .15s}
.li:focus{border-color:var(--lilly)}
.sigma{font-weight:700;background:#f0f4ff}

/* ── LIVES ── */
.lives-hd{background:linear-gradient(135deg,#4c1d95,#7c3aed);border-radius:14px;padding:24px 28px;margin-bottom:22px;color:#fff}
.lhd-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.lhd-title{font-family:'Nunito',sans-serif;font-size:22px;font-weight:700}
.lhd-sub{font-size:13px;opacity:.75;margin-top:3px}
.lhd-stats{display:flex;gap:28px}
.lstat{text-align:center}
.lstat-val{font-family:'Nunito',sans-serif;font-size:28px;font-weight:700}
.lstat-lbl{font-size:10px;font-family:'Quicksand',sans-serif;letter-spacing:.14em;text-transform:uppercase;opacity:.7;margin-top:2px}
.lives-pbar{margin-top:16px;background:rgba(255,255,255,.2);border-radius:99px;height:8px;overflow:hidden}
.lives-pfill{height:100%;border-radius:99px;background:#a78bfa;transition:width .4s}
.live-badge{padding:4px 11px;border-radius:99px;font-size:11px;font-weight:700;white-space:nowrap}
.lb-board{background:var(--blue-bg);color:var(--blue)}
.lb-glass{background:var(--green-bg);color:var(--green)}
.live-card{background:var(--white);border-radius:12px;padding:18px;border:1.5px solid var(--border);cursor:pointer;transition:all .2s}
.live-card:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.08)}
.live-card.board{border-color:var(--blue-border);background:linear-gradient(135deg,#fff,#f0f9ff)}
.live-card.glass{border-color:var(--green-border);background:linear-gradient(135deg,#fff,#f0fdf4)}
.lc-title{font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;margin:8px 0 5px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.lc-spk{font-size:13px;color:var(--muted);margin-bottom:4px}
.lc-date{font-size:12px;color:var(--muted);margin-bottom:10px}
.crit-pill{font-size:11px;font-weight:700;color:var(--red);background:var(--red-bg);border:1px solid var(--red-border);border-radius:5px;padding:4px 9px;margin-bottom:8px;display:inline-block}
.done-lbl{text-align:center;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-top:6px;font-weight:600}

/* ── LIVE DETAIL ── */
.ldet-hd{background:linear-gradient(135deg,#4c1d95,#7c3aed);padding:22px 32px;color:#fff}
.task-row{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:10px;border:2px solid;margin-bottom:8px;transition:all .15s}
.tr-done{background:var(--green-bg);border-color:var(--green-border)}
.tr-prog{background:#eff6ff;border-color:var(--blue-border)}
.tr-over{background:var(--red-bg);border-color:var(--red-border)}
.tr-def{background:var(--white);border-color:var(--border)}
/* THE TOGGLE CIRCLE — fixed square aspect ratio trick */
.toggle{
  flex-shrink:0;
  width:30px;height:30px;
  border-radius:50%;
  border:2.5px solid var(--border2);
  background:transparent;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transition:all .2s;
  font-size:14px;font-weight:700;color:#fff;
  line-height:1;
  aspect-ratio:1/1;
}
.toggle.tdone{background:#22c55e;border-color:#16a34a}
.toggle.tprog{background:#3b82f6;border-color:#2563eb;font-size:9px;letter-spacing:1px}
.toggle.tempty:hover{border-color:#7c3aed}
.task-name{flex:1;font-size:14px;font-weight:600;line-height:1.4;color:var(--ink)}
.task-name.done{text-decoration:line-through;color:var(--muted);font-weight:400}
.task-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px;align-items:center}
.rtag{padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700}
.ptag{padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700}
.tdate{font-size:12px;color:var(--muted)}
.tdate.over{color:var(--red);font-weight:700}
.task-actions{display:flex;gap:6px;flex-shrink:0;align-items:center}
.ibtn{width:32px;height:32px;border-radius:7px;border:1.5px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;transition:all .15s}
.ibtn:hover{background:var(--bg)}
.ibtn.del{border-color:var(--red-border);background:#fff5f5}
.ibtn.del:hover{background:var(--red-bg)}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;z-index:9999;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;color:#fff;box-shadow:0 8px 24px rgba(0,0,0,.2);animation:sup .3s ease}
@keyframes sup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── EMPTY ── */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:44px;margin-bottom:12px}
.empty-title{font-family:'Nunito',sans-serif;font-size:16px;font-weight:700;color:var(--ink);margin-bottom:6px}

/* ── REPORT TEXTAREA ── */
.report-ta{width:100%;height:300px;padding:14px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:12px;font-family:'Quicksand',sans-serif;line-height:1.7;resize:vertical;outline:none;background:#fafafa;color:#334155}
.report-ta:focus{border-color:var(--lilly)}

/* ── RESPONSIVE ── */
@media(max-width:860px){
  .sc-2col,.kpi-grid,.fgrid{grid-template-columns:1fr}
  .nav-right,.view-btns{display:none}
  .main-content{padding:18px}
  .filter-bar{padding:10px 18px}
  .header,.det-hd,.det-meta,.det-tabs,.det-body,.ldet-hd{padding-left:18px;padding-right:18px}
}
</style>
</head>
<body>
<div class="shell" id="app"></div>

<script>
// ═══════════════════════════════════════════
// CONSTANTS & DATA
// ═══════════════════════════════════════════
const STATUS = {
  concluido:    {label:'Concluído',    cls:'b-done'},

const e = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmt = v => v>=1e6?(v/1e6).toFixed(1)+'M':v>=1000?(v/1000).toFixed(0)+'K':(v||0).toLocaleString('pt-BR');
const fmtR = v => 'R$ '+(v||0).toLocaleString('pt-BR',{minimumFractionDigits:0});
const fmtD = d => { if(!d) return '—'; return new Date(d+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'}); };
const days = d => { if(!d) return null; return Math.ceil((new Date(d)-new Date())/86400000); };
const pct = steps => steps.length ? Math.round(steps.filter(s=>s.done).length/steps.length*100) : 0;
const pcol = v => v>=80?'#16a34a':v>=40?'#f59e0b':'#ef4444';

function av(name, sz=26, fs=10){
  const n=(name||'?').split(' ')[0];
  const bg=AV_COLORS[n]||'#94a3b8';
  return `<div class="av" style="width:${sz}px;height:${sz}px;font-size:${fs}px;background:${bg}">${e(n[0]?.toUpperCase()||'?')}</div>`;
}
function sbadge(s){
  const m=STATUS[s]||STATUS.planejado;
  return `<span class="badge ${e(m.cls)}"><span class="dot"></span>${e(m.label)}</span>`;
}
function pbadge(p){
  const m=PRIO[p]||PRIO.media;
  return `<span class="prio ${e(m.cls)}">${e(m.label)}</span>`;
}
function dlbadge(d){
  const n=days(d); if(n===null) return '';
  const c=n<0?'#dc2626':n<=14?'#f59e0b':'#94a3b8';
  const t=n<0?`${Math.abs(n)}d atrasado`:n===0?'Hoje!':`${n}d restantes`;
  return `<span class="dl-badge" style="color:${c}">${t}</span>`;
}
function rtag(r){
  const m={MED:{bg:'#ede9fe',c:'#6d28d9'},MKT:{bg:'#dbeafe',c:'#1d4ed8'},SPEAKER:{bg:'#dcfce7',c:'#15803d'},'MKT/MED':{bg:'#e0e7ff',c:'#4338ca'},TODOS:{bg:'#f1f5f9',c:'#475569'}};
  const s=m[r]||m.TODOS;
  return `<span class="rtag" style="background:${s.bg};color:${s.c}">${e(r)}</span>`;
}
function ptag(p){
  const m={'Crítica':{bg:'#fee2e2',c:'#dc2626'},Alta:{bg:'#ffedd5',c:'#ea580c'},'Média':{bg:'#fef9c3',c:'#ca8a04'},Baixa:{bg:'#f1f5f9',c:'#6b7280'}};
  const s=m[p]||m.Baixa;
  return `<span class="ptag" style="background:${s.bg};color:${s.c}">${e(p)}</span>`;
}

        </div>
        ${ns.owner&&ns.owner!=='TBD'?`<span style="font-size:11px;padding:2px 7px;border-radius:99px;background:rgba(0,0,0,.06);color:#64748b;white-space:nowrap">👤 ${e(ns.owner)}</span>`:''}
      </div>`:''}
      <div class="pbar-row">
        <span>${a.steps.length?`${done}/${a.steps.length} steps`:'Progresso'}</span>
        <span style="font-weight:700;color:${pcol(p)}">${p}%</span>

      <div class="pbar"><div class="pfill" style="width:${p}%;background:${pcol(p)}"></div></div>

// ── ACTIVITY DETAIL ─────────────────────────
function actDetail(){
  const a=activities.find(x=>x.id===S.selAct); if(!a) return '';
  const p=pct(a.steps), done=a.steps.filter(s=>s.done).length;
  const linkedLines=(ACT_BUD[a.id]||[]).map(id=>budgetLines.find(l=>l.id===id)).filter(Boolean);
  const budPlan=linkedLines.reduce((s,l)=>s+l.q1+l.q2+l.q3+l.q4,0);
  const budReal=linkedLines.reduce((s,l)=>s+l.real,0);
  const budP=budPlan?Math.round(budReal/budPlan*100):0;

  const tabs=[{id:'visao',lbl:'Visão Geral'},{id:'steps',lbl:`Steps (${done}/${a.steps.length})`},{id:'budget',lbl:`💰 Budget${budPlan?' · '+fmt(budPlan):''}`},{id:'historico',lbl:'Histórico'}];

  let body='';
  if(S.actTab==='visao') body=actVisao(a,p,done,budPlan,budReal,budP);
  if(S.actTab==='steps') body=actSteps(a,p,done);
  if(S.actTab==='budget') body=actBudget(linkedLines,budPlan,budReal,budP);
  if(S.actTab==='historico') body=actHistorico(a);

  return `
  <div class="shell">
    <div class="det-hd">
      <button class="det-back" data-a="back">← Voltar ao Painel</button>
      <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px">
        <div>
          <div style="font-size:26px;margin-bottom:5px">${ICONS[a.category]||'📌'}</div>
          <h1 style="font-family:'Nunito',sans-serif;font-size:24px;font-weight:700;color:#fff;margin-bottom:6px;line-height:1.2">${e(a.name)}</h1>
          <p style="font-size:14px;color:rgba(255,255,255,.65)">${e(a.description)}</p>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end">${sbadge(a.status)} ${pbadge(a.priority)} ${dlbadge(a.deadline)}</div>
      </div>
      <div style="margin-top:18px;background:rgba(255,255,255,.1);border-radius:10px;padding:12px 16px">
        <div style="display:flex;justify-content:space-between;font-size:13px;color:rgba(255,255,255,.75);margin-bottom:7px"><span>Progresso</span><span>${p}%</span></div>
        <div style="background:rgba(255,255,255,.2);border-radius:99px;height:8px"><div style="width:${p}%;height:100%;border-radius:99px;background:#22c55e;transition:width .4s"></div></div>
      </div>
    </div>
    <div class="det-meta">
      ${[['PMO/Owner',a.owner],['Prazo',fmtD(a.deadline)],['Quarter',a.quarter],['Categoria',a.category]].map(([k,v])=>`<div><div class="dm-lbl">${k}</div><div class="dm-val">${e(v)}</div></div>`).join('')}
    </div>
    <div class="det-tabs">
      ${tabs.map(t=>`<button class="nav-tab ${S.actTab===t.id?'active':''}" data-a="actTab" data-v="${t.id}">${e(t.lbl)}</button>`).join('')}
    </div>
    <div class="det-body"><div class="container">${body}</div></div>
  </div>`;
}

    <div class="sc" style="grid-column:1/-1">

        <div class="fg"><label class="fl">${l}</label><input class="fc" type="${t}" value="${e(a[f])}" data-a="upActF" data-id="${a.id}" data-f="${f}"></div>`).join('')}
        ${[['Status','status',Object.keys(STATUS)],['Prioridade','priority',Object.keys(PRIO)],['Quarter','quarter',['Q1','Q2','Q3','Q4','Q1/Q2','Q1–Q4']],['Categoria','category',Object.keys(ICONS)]].map(([l,f,opts])=>`
        <div class="fg"><label class="fl">${l}</label><select class="fc" data-a="upActF" data-id="${a.id}" data-f="${f}">
          ${opts.map(o=>`<option value="${o}" ${a[f]===o?'selected':''}>${STATUS[o]?.label||PRIO[o]?.label||o}</option>`).join('')}

      </div>
    </div>
    <div class="sc">
      <div class="sc-title" style="justify-content:space-between">📋 Steps <button class="btn btn-outline btn-xs" data-a="actTab" data-v="steps">Gerenciar →</button></div>
      <div class="pbar-row"><span>${done}/${a.steps.length} steps</span><span style="font-weight:700;color:${pcol(p)}">${p}%</span></div>
      <div class="pbar" style="margin-bottom:14px"><div class="pfill" style="width:${p}%;background:${pcol(p)}"></div></div>
      ${cur?`<div style="padding:12px 14px;background:#f5f3ff;border-radius:9px;border:1.5px solid #c4b5fd;margin-bottom:10px">
        <div style="font-size:10px;font-family:'Quicksand',sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#7c3aed;margin-bottom:5px">▶ Step Atual</div>

      </div>`:''}
      ${!cur&&a.steps.length?`<div style="padding:14px;background:#f0fdf4;border-radius:9px;text-align:center;border:1.5px solid #bbf7d0"><div style="font-size:22px">🎉</div><div style="font-size:14px;font-weight:700;color:#16a34a;margin-top:4px">Todos os steps concluídos!</div></div>`:''}
      ${a.steps.slice(0,4).map((s,i)=>{
        const c=!s.done&&a.steps.filter(x=>!x.done)[0]?.id===s.id;
        return `<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f1f5f9">
          <div style="width:20px;height:20px;border-radius:50%;flex-shrink:0;background:${s.done?'#22c55e':c?'#7c3aed':'#e2e8f0'};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff">${s.done?'✓':(i+1)}</div>
          <span style="font-size:13px;${s.done?'text-decoration:line-through;color:#94a3b8':'font-weight:500'}">${e(s.label)}</span>

      ${a.steps.length>4?`<div style="font-size:12px;color:#94a3b8;margin-top:8px;text-align:center">+${a.steps.length-4} steps... <button class="btn btn-outline btn-xs" data-a="actTab" data-v="steps">Ver todos</button></div>`:''}
    </div>
    <div class="sc">
      <div class="sc-title">👥 Equipe</div>
      ${a.team.map(m=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">${av(m,32,13)}<div style="font-size:14px;font-weight:600">${e(m)}</div></div>`).join('')}
      ${budPlan?`<div style="margin-top:14px;padding-top:14px;border-top:1px solid #f1f5f9">
        <div style="font-size:10px;font-family:'Quicksand',sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#94a3b8;margin-bottom:8px">💰 Budget desta atividade</div>
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px"><span>Planejado</span><strong style="color:#6366f1">${fmtR(budPlan)}</strong></div>
        <div class="pbar" style="height:6px"><div class="pfill" style="width:${budP}%;background:${pcol(budP)}"></div></div>
        <div style="font-size:11px;color:#94a3b8;margin-top:3px">${budP}% executado · ${fmtR(budReal)}</div>
      </div>`:''}</div>
  </div>`;
}

function actSteps(a,p,done){
  return `
  <div class="sc">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="sc-title" style="margin-bottom:0">Checklist de Steps</div>

    </div>
    <div class="pbar" style="margin-bottom:18px"><div class="pfill" style="width:${p}%;background:${pcol(p)}"></div></div>
    ${a.steps.map(s=>{
      const cur=!s.done&&a.steps.filter(x=>!x.done)[0]?.id===s.id;
      const cls=s.done?'sr-done':cur?'sr-cur':'sr-def';
      const chkBg=s.done?'#22c55e':cur?'#7c3aed':'transparent';
      const chkBr=s.done?'#16a34a':cur?'#6d28d9':'#cbd5e1';

        <div class="step-chk" style="background:${chkBg};border-color:${chkBr}" data-a="togStep" data-aid="${a.id}" data-sid="${s.id}">${s.done?'✓':''}</div>
        <span class="step-txt ${s.done?'done':''}">${e(s.label)}</span>
        <select style="padding:4px 8px;border:1.5px solid #e2e8f0;border-radius:6px;font-size:12px;background:#fff;color:#7c3aed;font-weight:600;outline:none" data-a="stepOwner" data-aid="${a.id}" data-sid="${s.id}">
          ${TEAM.map(m=>`<option value="${m}" ${s.owner===m?'selected':''}>${m}</option>`).join('')}

      <select data-a="nsOwner" style="padding:10px 11px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;background:#fff;outline:none;color:#7c3aed;font-weight:600">
        ${TEAM.map(m=>`<option value="${m}" ${S.newStepOwner===m?'selected':''}>${m}</option>`).join('')}
      </select>
      <button class="btn btn-purple" data-a="addStep" data-aid="${a.id}">+ Adicionar</button>

function actBudget(lines,budPlan,budReal,budP){
  if(!lines.length) return `<div class="sc"><div style="text-align:center;padding:30px;color:#94a3b8"><div style="font-size:36px;margin-bottom:10px">💰</div><p>Nenhuma linha de budget vinculada.</p></div></div>`;
  return `
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px">
    ${[{l:'Planejado',v:fmtR(budPlan),c:'#6366f1',bg:'#eef2ff',i:'📋'},{l:'Executado',v:fmtR(budReal),sub:`${budP}%`,c:budP>=80?'#16a34a':'#f59e0b',bg:budP>=80?'#f0fdf4':'#fffbeb',i:'✅'},{l:'Saldo',v:fmtR(budPlan-budReal),c:'#2563eb',bg:'#dbeafe',i:'💳'}].map(k=>`
    <div class="kpi-c" style="background:${k.bg};border-color:${k.c}22">
      <div class="kpi-icon">${k.i}</div><div class="kpi-val" style="color:${k.c}">${k.v}</div>
      <div class="kpi-lbl">${k.l}</div>${k.sub?`<div class="kpi-sub" style="color:${k.c}">${k.sub}</div>`:''}</div>`).join('')}
  </div>
  ${lines.map(l=>{
    const lt=l.q1+l.q2+l.q3+l.q4,lp=lt?Math.round(l.real/lt*100):0;
    return `<div class="sc"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div><div style="font-size:14px;font-weight:700">${e(l.item)}</div><div style="font-size:12px;color:#94a3b8">${e(l.forn)} · ${e(l.cat)}</div></div>
      <div style="text-align:right"><div style="font-size:15px;font-weight:700">${fmtR(lt)}</div><div style="font-size:11px;color:#94a3b8">${lp}% executado</div></div>
    </div>
    <div class="pbar"><div class="pfill" style="width:${lp}%;background:${pcol(lp)}"></div></div></div>`;
  }).join('')}`;
}

        <div style="font-size:14px">${e(c.text)}</div>

// ── BUDGET TAB ───────────────────────────────
function budgetTab(){
  const cats=[...new Set(budgetLines.map(l=>l.cat))];
  const totPlan=budgetLines.reduce((s,l)=>s+l.q1+l.q2+l.q3+l.q4,0);
  const totReal=budgetLines.reduce((s,l)=>s+l.real,0);
  const totPct=totPlan?Math.round(totReal/totPlan*100):0;
  const dev=totPlan-TOTAL_LOCKED;
  const Q=cq();

  return `
  <div class="main-content"><div class="container">
    ${dev!==0?`<div style="background:${dev>0?'#fef2f2':'#f0fdf4'};border:1.5px solid ${dev>0?'#fecaca':'#bbf7d0'};border-radius:10px;padding:11px 18px;margin-bottom:18px;display:flex;gap:10px;align-items:center">
      <span style="font-size:16px">${dev>0?'⚠️':'✅'}</span>
      <span style="font-size:13px;font-weight:600;color:${dev>0?'#991b1b':'#166534'}">
        Teto: ${fmtR(TOTAL_LOCKED)} · Alocado: ${fmtR(totPlan)} · Desvio: <strong>${dev>0?'+':''}${fmtR(dev)}</strong>
        ${dev>0?' — Revise para não exceder o teto':' — Saldo disponível'}
      </span>
    </div>`:''}
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:22px">
      <div>
        <h2 style="font-family:'Nunito',sans-serif;font-size:20px;font-weight:700;margin-bottom:5px">💰 Budget OPEX 2026 — Medical CWM</h2>
        <div style="display:flex;gap:18px;flex-wrap:wrap;font-size:13px;color:#64748b">
          <span>🔒 Teto: <strong style="color:#0f172a">${fmtR(TOTAL_LOCKED)}</strong></span>
          <span>📋 Alocado: <strong style="color:${dev>0?'#dc2626':dev<0?'#16a34a':'#0f172a'}">${fmtR(totPlan)}</strong></span>
          <span>Executado: <strong style="color:${pcol(totPct)}">${totPct}%</strong></span>
        </div>
      </div>
    </div>
    <div class="kpi-grid">
      ${[{l:'Teto Aprovado',v:fmtR(TOTAL_LOCKED),c:'#0f172a',bg:'#f8fafc',i:'🔒'},{l:'Total Alocado',v:fmtR(totPlan),sub:`Desvio: ${dev>0?'+':''}${fmtR(dev)}`,c:dev>0?'#dc2626':dev<0?'#16a34a':'#6366f1',bg:dev>0?'#fef2f2':dev<0?'#f0fdf4':'#eef2ff',i:'📋'},{l:'Total Executado',v:fmtR(totReal),sub:`${totPct}%`,c:totPct>=80?'#16a34a':'#f59e0b',bg:totPct>=80?'#f0fdf4':'#fffbeb',i:'✅'},{l:'Saldo p/ Executar',v:fmtR(totPlan-totReal),c:'#2563eb',bg:'#dbeafe',i:'💳'}].map(k=>`
      <div class="kpi-c" style="background:${k.bg};border-color:${k.c}22">
        <div class="kpi-icon">${k.i}</div><div class="kpi-val" style="color:${k.c}">${k.v}</div>
        <div class="kpi-lbl">${k.l}</div>${k.sub?`<div class="kpi-sub" style="color:${k.c}">${k.sub}</div>`:''}</div>`).join('')}
    </div>
    <div class="sc">
      <div class="sc-title">📊 Execução por Categoria <span style="font-size:12px;font-family:'Quicksand',sans-serif;color:#94a3b8;font-weight:400">· clique para editar valores</span></div>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead><tr style="background:#f8fafc;border-bottom:2px solid #e2e8f0">
            <th style="padding:9px 10px;width:30px"></th>
            <th style="padding:9px 10px;text-align:left;font-size:11px;font-family:'Quicksand',sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#94a3b8">Categoria</th>
            ${['Q1','Q2','Q3','Q4'].map(q=>`<th style="padding:9px 10px;text-align:right;font-size:11px;font-family:'Quicksand',sans-serif;letter-spacing:.14em;text-transform:uppercase;color:${q.toLowerCase()===Q?'#6366f1':'#94a3b8'}">${q}</th>`).join('')}
            <th style="padding:9px 10px;text-align:right;font-size:11px;font-family:'Quicksand',sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#6366f1;background:#f0f4ff">Σ Total</th>
            <th style="padding:9px 10px;text-align:right;font-size:11px;font-family:'Quicksand',sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#6366f1;background:#f0f4ff">Σ Exec.</th>
            <th style="padding:9px 10px;text-align:right;font-size:11px;font-family:'Quicksand',sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#94a3b8">%</th>
          </tr></thead>
          <tbody>
            ${cats.map((cat,ci)=>{
              const cl=budgetLines.filter(l=>l.cat===cat);
              const p2=cl.reduce((s,l)=>s+l.q1+l.q2+l.q3+l.q4,0);
              const r=cl.reduce((s,l)=>s+l.real,0);
              const pc2=p2?Math.round(r/p2*100):0;
              if(!p2&&cl.every(l=>!l.q1&&!l.q2&&!l.q3&&!l.q4)) return '';
              const sc=pc2>=90?'#16a34a':pc2>=50?'#f59e0b':pc2>0?'#3b82f6':'#94a3b8';
              const isOpen=S.budOpenCat===cat;
              const cc=CAT_COLORS[ci%CAT_COLORS.length];
              const pLocked=TOTAL_LOCKED?((p2/TOTAL_LOCKED)*100).toFixed(1):0;
              return `
              <tr style="border-bottom:${isOpen?'none':'1px solid #e2e8f0'};background:${isOpen?'#f0f4ff':'#f8fafc'};cursor:pointer" data-a="togCat" data-cat="${e(cat)}">
                <td style="padding:9px 10px"><div class="cat-icon" style="background:${cc}">${isOpen?'▲':'▼'}</div></td>
                <td style="padding:9px 10px;font-weight:700;font-size:13px;color:${isOpen?'#6366f1':'#0f172a'}">
                  ${e(cat)} <span style="font-size:10px;padding:1px 6px;border-radius:99px;background:#e0e7ff;color:#4338ca;font-weight:700;margin-left:4px">${pLocked}%</span>
                  <div style="font-size:11px;color:#94a3b8;font-weight:400">${cl.length} linha${cl.length!==1?'s':''} · ${isOpen?'▲ colapsar':'▼ expandir'}</div>
                </td>
                ${['q1','q2','q3','q4'].map(q=>{
                  const qv=cl.reduce((s,l)=>s+l[q],0);
                  return `<td style="padding:9px 10px;text-align:right;font-weight:${q===Q?800:600};color:${q===Q?'#6366f1':'#64748b'};background:${q===Q?'rgba(99,102,241,.04)':'transparent'}">${qv?fmt(qv):'—'}</td>`;
                }).join('')}
                <td style="padding:9px 10px;text-align:right;font-weight:700;background:#f0f4ff">${fmtR(p2)}</td>

// ── LIVE DETAIL ──────────────────────────────
function liveDetail(){
  const lv=LIVES.find(l=>l.id===S.selLive); if(!lv) return '';
  // Sort by deadline date ascending (earliest first)
  const tasks=liveTasks.filter(t=>t.liveId===lv.id).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
  const done=tasks.filter(t=>t.status==='Concluída').length;
  const p=tasks.length?Math.round(done/tasks.length*100):0;
  const isB=lv.tipo==='endoBOARD';
  const today=new Date();

  // Dynamic priority based on days to deadline
  function dynPrio(t){
    if(t.status==='Concluída') return t.prio;
    const d=Math.ceil((new Date(t.deadline)-today)/86400000);
    if(d<=7)  return 'Crítica';
    if(d<=15) return 'Alta';
    if(d<=30) return 'Média';
    return 'Baixa';
  }
  return `
  <div class="shell">
    <div class="ldet-hd">
      <button class="det-back" data-a="backLive">← Voltar para todas as Lives</button>
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
            <span class="live-badge ${isB?'lb-board':'lb-glass'}" style="font-size:12px;padding:5px 13px">${e(lv.tipo)}</span>
            <span style="font-size:13px;color:rgba(255,255,255,.5)">${e(lv.vem)}</span>
            <span style="font-size:13px;color:rgba(255,255,255,.5)">· ${e(lv.mes)}/2026</span>
          </div>
          <h2 style="font-family:'Nunito',sans-serif;font-size:21px;font-weight:700;color:#fff;margin-bottom:10px;line-height:1.25">${e(lv.titulo)}</h2>
          <div style="font-size:14px;color:rgba(255,255,255,.75);margin-bottom:3px">👤 <strong style="color:#fff">Speakers:</strong> ${e(lv.s1)}${lv.s2?' · '+lv.s2:''}</div>
          <div style="font-size:14px;color:rgba(255,255,255,.75);margin-bottom:3px">🎯 <strong style="color:#fff">Tema:</strong> ${e(lv.tema)}</div>
          <div style="font-size:14px;color:rgba(255,255,255,.75)">📅 <strong style="color:#fff">Data:</strong> ${fmtD(lv.data)}</div>
        </div>
        <div style="background:rgba(255,255,255,.12);border-radius:12px;padding:16px 22px;text-align:center;min-width:110px">
          <div style="font-family:'Nunito',sans-serif;font-size:32px;font-weight:900;color:#fff">${p}%</div>
          <div style="font-size:10px;font-family:'Quicksand',sans-serif;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:8px">Progresso</div>
          <div style="background:rgba(255,255,255,.2);border-radius:99px;height:7px;width:90px;overflow:hidden">
            <div style="width:${p}%;height:100%;background:#a78bfa;transition:width .4s"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="det-body"><div class="container">
      <div class="sc">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
          <div class="sc-title" style="margin-bottom:0">📋 Checklist de Tarefas</div>
          <button class="btn btn-purple btn-sm" data-a="addTask" data-lid="${lv.id}">+ Nova Tarefa</button>
        </div>
        ${tasks.map(t=>{
          const isPast=new Date(t.deadline)<today&&t.status!=='Concluída';
          const cls=t.status==='Concluída'?'tr-done':t.status==='Em Progresso'?'tr-prog':isPast?'tr-over':'tr-def';
          const tcls=t.status==='Concluída'?'tdone':t.status==='Em Progresso'?'tprog':'tempty';
          const tcont=t.status==='Concluída'?'✓':t.status==='Em Progresso'?'···':'';

            <div class="toggle ${tcls}" data-a="cycTask" data-tid="${e(t.id)}">${tcont}</div>
            <div style="flex:1;min-width:0">
              <div class="task-name ${t.status==='Concluída'?'done':''}">${e(t.nome)}</div>
              ${t.notas?`<div style="font-size:12px;color:#64748b;font-style:italic;margin-top:2px">${e(t.notas)}</div>`:''}
              <div class="task-tags">
                ${rtag(t.resp)}${ptag(prio)}
                <span class="tdate ${isPast?'over':''}">📅 ${fmtD(t.deadline)}</span>
              </div>

            <span style="padding:4px 10px;border-radius:99px;font-size:12px;font-weight:600;background:${t.status==='Concluída'?'#dcfce7':t.status==='Em Progresso'?'#dbeafe':'#f1f5f9'};color:${t.status==='Concluída'?'#16a34a':t.status==='Em Progresso'?'#2563eb':'#64748b'};white-space:nowrap;flex-shrink:0">${e(t.status)}</span>

            <div style="font-size:13px;color:#64748b;margin-top:4px">${l}</div>
          </div>`).join('')}
        </div>
      </div>
    </div></div>
  </div>`;
}

  const PERSON_COLORS = {Bia:'#6366f1',Fabi:'#8b5cf6','Ana Carolina':'#10b981',Amanda:'#f97316',Matheus:'#06b6d4'};

  const STATUS_CL = {
    concluida:    {label:'Concluída',    bg:'#dcfce7',c:'#16a34a'},
    em_andamento: {label:'Em andamento', bg:'#fef3c7',c:'#b45309'},
    nao_iniciada: {label:'Não iniciada', bg:'#f1f5f9',c:'#64748b'},
  };

  const today = new Date();

  function dynPrioCL(item){
    const d=Math.ceil((new Date(item.deadline)-today)/86400000);
    if(item.status==='concluida') return null;
    if(d<=7)  return {label:'Crítica',bg:'#fee2e2',c:'#dc2626'};

    if(d<=30) return {label:'Média',  bg:'#fef9c3',c:'#ca8a04'};
    return null;
  }

  const totais = {
    total: checklistItems.length,
    done: checklistItems.filter(x=>x.status==='concluida').length,
    prog: checklistItems.filter(x=>x.status==='em_andamento').length,
    pend: checklistItems.filter(x=>x.status==='nao_iniciada').length,
  };
  const pct = totais.total?Math.round(totais.done/totais.total*100):0;

  return `

    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:22px">
      ${PERSONS.map(p=>{
        const items=checklistItems.filter(x=>x.person===p);

// ═══════════════════════════════════════════
// EVENT BINDING
// ═══════════════════════════════════════════
function bind(){
  document.querySelectorAll('[data-a]').forEach(el=>{
    const isInput=el.tagName==='INPUT'||el.tagName==='SELECT'||el.tagName==='TEXTAREA';
    el.addEventListener(isInput?'change':'click', handle);
    if(el.tagName==='INPUT'&&(el.dataset.a==='fq'||el.dataset.a==='nsInput'||el.dataset.a==='ncInput')){
      el.addEventListener('input', handle);
    }
    if(el.tagName==='INPUT') el.addEventListener('keydown',ev=>{if(ev.key==='Enter'){ev.preventDefault();handle({target:el});}});
  });
}

function handle(ev){
  const el=ev.target.closest('[data-a]')||ev.target;
  const a=el.dataset.a;
  if(!a) return;
  ev.stopPropagation();

  switch(a){
    case 'tab': S.tab=el.dataset.v; S.selAct=null; S.selLive=null; render(); break;
    case 'view': S.view=el.dataset.v; render(); break;
    case 'fq': S.fQ=el.value; render(); break;
    case 'fs': S.fStatus=el.value; render(); break;
    case 'fc': S.fCat=el.value; render(); break;
    case 'clearF': S.fStatus='todos'; S.fCat='todos'; S.fQ=''; render(); break;
    case 'lfTipo': S.lfTipo=el.value; render(); break;
    case 'lfMes': S.lfMes=el.value; render(); break;
    case 'clearLF': S.lfTipo=''; S.lfMes=''; render(); break;

    case 'selAct': S.selAct=parseInt(el.dataset.id); S.actTab='visao'; render(); break;
    case 'back': S.selAct=null; render(); break;
    case 'actTab': S.actTab=el.dataset.v; render(); break;

    case 'selLive': S.selLive=parseInt(el.dataset.lid); render(); break;
    case 'backLive': S.selLive=null; render(); break;

    case 'togStep':{
      const ac=activities.find(x=>x.id===parseInt(el.dataset.aid));
      if(ac){const s=ac.steps.find(s=>s.id===parseInt(el.dataset.sid));if(s)s.done=!s.done;render();}break;
    }
    case 'stepOwner':{
      const ac=activities.find(x=>x.id===parseInt(el.dataset.aid));
      if(ac){const s=ac.steps.find(s=>s.id===parseInt(el.dataset.sid));if(s)s.owner=el.value;}break;
    }
    case 'delStep':{
      const ac=activities.find(x=>x.id===parseInt(el.dataset.aid));
      if(ac){ac.steps=ac.steps.filter(s=>s.id!==parseInt(el.dataset.sid));render();}break;
    }
    case 'nsInput': S.newStep=el.value; break;
    case 'nsOwner': S.newStepOwner=el.value; break;
    case 'addStep':{
      if(!S.newStep.trim()) return;
      const ac=activities.find(x=>x.id===parseInt(el.dataset.aid));
      if(ac){ac.steps.push({id:Date.now(),label:S.newStep.trim(),done:false,owner:S.newStepOwner});S.newStep='';render();}break;
    }
    case 'ncInput': S.newComment=el.value; break;
    case 'addComment':{
      if(!S.newComment.trim()) return;
      const ac=activities.find(x=>x.id===parseInt(el.dataset.aid));
      if(ac){ac.comments.push({id:Date.now(),text:S.newComment.trim(),at:new Date().toLocaleString('pt-BR'),by:'Você'});S.newComment='';render();}break;
    }
    case 'upActF':{
      const ac=activities.find(x=>x.id===parseInt(el.dataset.id));
      if(ac)ac[el.dataset.f]=el.value;break;
    }
    case 'delAct': ev.preventDefault(); S.delTarget=parseInt(el.dataset.id); S.modal='delAct'; render(); break;
    case 'confDel': activities=activities.filter(a=>a.id!==S.delTarget); S.delTarget=null; S.modal=null; S.selAct=null; toast('🗑️ Atividade excluída.','info'); break;

    case 'newAct': S.modal='newAct'; render(); break;
    case 'saveAct':{
      const f=document.querySelector('.modal');
      const g=n=>f.querySelector(`[name="${n}"]`)?.value||'';
      activities.push({id:Date.now(),name:g('nm'),category:g('nc'),owner:g('no'),status:g('ns'),priority:g('np'),deadline:g('nd'),quarter:g('nq'),description:g('nds'),steps:[],comments:[],team:[g('no')]});
      S.modal=null; toast('✅ Atividade criada!'); break;
    }

    case 'togCat': S.budOpenCat=S.budOpenCat===el.dataset.cat?null:el.dataset.cat; render(); break;
    case 'upBud':{
      const l=budgetLines.find(x=>x.id===parseInt(el.dataset.lid));
      if(l){l[el.dataset.f]=Number(el.value)||0; lsSave();} break;
    }

    case 'cycTask':{
      const t=liveTasks.find(x=>x.id===el.dataset.tid);
      if(t){t.status=t.status==='Não Iniciada'?'Em Progresso':t.status==='Em Progresso'?'Concluída':'Não Iniciada';render();lsSave();}break;
    }
    case 'editTask': S.editTask=el.dataset.tid; S.modal='editTask'; render(); break;
    case 'saveTask':{
      const t=liveTasks.find(x=>x.id===el.dataset.tid);
      const f=document.querySelector('.modal');
      if(t&&f){
        t.nome=f.querySelector('[name="tn"]')?.value||t.nome;
        t.deadline=f.querySelector('[name="td"]')?.value||t.deadline;
        t.notas=f.querySelector('[name="tno"]')?.value||'';
        t.resp=f.querySelector('[name="tr"]')?.value||t.resp;
        t.status=f.querySelector('[name="ts"]')?.value||t.status;
        t.prio=f.querySelector('[name="tp"]')?.value||t.prio;
      }
      S.modal=null; S.editTask=null; toast('✅ Tarefa salva!'); lsSave(); break;
    }
    case 'delTask': liveTasks=liveTasks.filter(x=>x.id!==el.dataset.tid); toast('🗑️ Tarefa excluída.','info'); lsSave(); break;
    case 'addTask':{
      const lid=parseInt(el.dataset.lid), lv=LIVES.find(l=>l.id===lid);
      const nt={id:`${lid}-${Date.now()}`,liveId:lid,nome:'Nova Tarefa',resp:'MED',deadline:lv?.data||'',status:'Não Iniciada',prio:'Média',dias:0,notas:''};
      liveTasks.push(nt); S.editTask=nt.id; S.modal='editTask'; render(); break;
    }

    case 'addCL': S.addCLperson=el.dataset.person; S.modal='addCL'; render(); break;
    case 'saveNewCL':{
      const f=document.querySelector('.modal');
      const g=n=>f.querySelector(`[name="${n}"]`)?.value||'';
      checklistItems.push({id:'c'+Date.now(),person:g('cl_person'),activity:g('cl_act'),task:g('cl_task'),status:g('cl_status')||'nao_iniciada',deadline:g('cl_deadline'),notes:g('cl_notes')});
      S.modal=null; toast('✅ Tarefa criada!'); lsSave(); break;
    }
    case 'editCL': S.editCLid=el.dataset.cid; S.modal='editCL'; render(); break;
    case 'saveCL':{
      const item=checklistItems.find(x=>x.id===el.dataset.cid);
      const f=document.querySelector('.modal');
      if(item&&f){
        item.task=f.querySelector('[name="cl_task"]')?.value||item.task;
        item.activity=f.querySelector('[name="cl_act"]')?.value||item.activity;
        item.person=f.querySelector('[name="cl_person"]')?.value||item.person;
        item.deadline=f.querySelector('[name="cl_deadline"]')?.value||item.deadline;
        item.status=f.querySelector('[name="cl_status"]')?.value||item.status;
        item.notes=f.querySelector('[name="cl_notes"]')?.value||'';
      }
      S.modal=null; S.editCLid=null; toast('✅ Tarefa salva!'); lsSave(); break;
    }
    case 'delCL': checklistItems=checklistItems.filter(x=>x.id!==el.dataset.cid); toast('🗑️ Tarefa excluída.','info'); lsSave(); break;
    case 'upCLStatus':{
      const item=checklistItems.find(x=>x.id===el.dataset.cid);
      if(item){
        const cycle={nao_iniciada:'em_andamento',em_andamento:'concluida',concluida:'nao_iniciada'};
        item.status=cycle[item.status]||'nao_iniciada';
      }
      render(); lsSave(); break;
    }
    case 'todoAdd':
      S.todoForm='new'; S.todoEdit={text:'',owner:'Bianca'};
      render(); setTimeout(()=>document.getElementById('todoTxt')?.focus(),40); break;
    case 'todoEdit':{
      const ti=parseInt(el.dataset.ti);
      S.todoForm=ti; S.todoEdit={text:TODO_ITEMS[ti]?.text||'', owner:TODO_ITEMS[ti]?.owner||'Bianca'};
      render(); setTimeout(()=>document.getElementById('todoTxt')?.focus(),40); break;
    }
    case 'todoOwnerPick':
      S.todoEdit={...S.todoEdit, owner:el.dataset.v}; render(); break;
    case 'todoCancel': S.todoForm=false; S.todoEdit={text:'',owner:'Bianca'}; render(); break;
    case 'todoCommit':{
      const txt=(document.getElementById('todoTxt')?.value||'').trim();
      if(txt){
        if(S.todoForm==='new'){
          TODO_ITEMS.push({text:txt, owner:S.todoEdit?.owner||'Bianca', done:false});
        } else {
          const ti=parseInt(S.todoForm);
          if(TODO_ITEMS[ti]){ TODO_ITEMS[ti].text=txt; TODO_ITEMS[ti].owner=S.todoEdit?.owner||TODO_ITEMS[ti].owner; }
        }
      }
      S.todoForm=false; S.todoEdit={text:'',owner:'Bianca'}; render(); lsSave(); break;
    }
    case 'todoDone':{
      const ti=parseInt(el.dataset.ti);
      if(TODO_ITEMS[ti]) TODO_ITEMS[ti].done=!TODO_ITEMS[ti].done;
      render(); lsSave(); break;
    }
    case 'todoDel':{
      const ti=parseInt(el.dataset.ti);
      TODO_ITEMS.splice(ti,1);
      render(); lsSave(); break;
    }
    case 'todoSave':{
      const txt=(document.getElementById('todoInput')?.value||'').trim();
      const own=document.getElementById('todoOwner')?.value||'Bianca';
      if(txt) TODO_ITEMS.push({text:txt,owner:own,done:false});
      S.todoForm=false; render(); break;
    }
    case 'lfEpSerie': S.lfEpSerie=el.value; render(); break;
    case 'clearEpF':  S.lfEpSerie=''; render(); break;
    case 'todoHelpToggle': S.todoHelp=!S.todoHelp; render(); break;
    case 'medToggle': S.medOpen=!S.medOpen; render(); break;
    case 'tlToggle': S.tlOpen=!S.tlOpen; S.tlForm=false; render(); break;
    case 'tlAdd':    S.tlForm=true; render(); setTimeout(()=>document.getElementById('tlf_nome')?.focus(),50); break;
    case 'tlFormCancel': S.tlForm=false; render(); break;
    case 'tlFormSave':{
      const g = id => (document.getElementById(id)?.value||'').trim();
      const nome=g('tlf_nome'), owner=g('tlf_owner'), atividade=g('tlf_ativ'), data=g('tlf_data'), local=g('tlf_local'), valor=parseFloat(g('tlf_valor'))||null;
      if(nome && atividade){
        TL_DATA.push({id:'tl'+(TL_DATA.length+1), nome, owner, atividade, data, local, valor});
      }
      S.tlForm=false; render(); break;
    }
    case 'staffTab': S.staffTab=el.dataset.v; render(); break;
    case 'removeTag':{
      const allData=[...STAFF_DATA,...STAFF_EVENTOS];
      const row=allData.find(r=>r.id===el.dataset.rid);
      if(row){
        const key=el.dataset.f==='mkt'?'mktTags':'medTags';
        if(row[key]) row[key].splice(parseInt(el.dataset.ti),1);
      }
      render(); break;
    }
    case 'vMes':  S.vMes  = S.vMes===el.dataset.v?'todos':el.dataset.v; render(); break;
    case 'vTipo': S.vTipo = S.vTipo===el.dataset.v?'todos':el.dataset.v; render(); break;
    case 'vResp': S.vResp = S.vResp===el.dataset.v?'todos':el.dataset.v; render(); break;
    case 'vClear': S.vMes='todos'; S.vTipo='todos'; S.vResp='todos'; render(); break;
    case 'reachQ': S.reachQ=el.value; render(); break;
    case 'clearRQ': S.reachQ=''; render(); break;
    case 'reachSub': S.reachSub=el.dataset.v; render(); break;
    case 'upReach':{
      const row=REACH_DATA.find(r=>r.id===el.dataset.rid);
      if(row) row[el.dataset.f]=el.value;
      break;
    }
    case 'openReachModal': S.modal='reachActivities'; render(); break;
    case 'report': S.modal='report'; render(); break;
    case 'copyRep':{
      const txt=document.getElementById('repTxt')?.value;
      if(txt)navigator.clipboard.writeText(txt).then(()=>toast('📋 Copiado!'));break;
    }
    case 'closeM': S.modal=null; S.editTask=null; render(); break;
  }
}

  const m={'MKT':{bg:'#dbeafe',c:'#1d4ed8'},'MED':{bg:'#ede9fe',c:'#6d28d9'},'MKT/MED':{bg:'#e0e7ff',c:'#4338ca'},'NTA':{bg:'#f1f5f9',c:'#475569'}};
  const s=m[o]||m.NTA;
  return `background:${s.bg};color:${s.c}`;
}
function personStyle(v){
  if(!v||v==='—') return 'background:#f1f5f9;color:#94a3b8';
  if(['Bianca','Ana Carolina','Matheus','Amanda'].includes(v)) return 'background:#ede9fe;color:#6d28d9';
  if(['Fabiana'].includes(v))                                   return 'background:#dbeafe;color:#1d4ed8';
  if(v.includes('+'))                                           return 'background:#f5f3ff;color:#7c3aed';
  if(['Janine','Emily','Isabella','Flávia'].includes(v))        return 'background:#dcfce7;color:#15803d';
  if(['Durigon','Braiti','Rebeca','Duda','Julia'].includes(v))  return 'background:#fef3c7;color:#b45309';
  return 'background:#f1f5f9;color:#64748b';
}

// inline dropdown for a cell
function rdropdown(rid, field, val, opts){
  const st=personStyle(val);
  return `<select data-a="upReach" data-rid="${rid}" data-f="${field}" style="padding:3px 8px;border-radius:99px;font-size:11px;font-weight:700;border:none;cursor:pointer;outline:none;${st};appearance:none;-webkit-appearance:none;text-align:center;min-width:80px">
    ${opts.map(o=>`<option value="${o}" ${o===val?'selected':''}>${o}</option>`).join('')}
  </select>`;
}

function reachTab(){
  const secs=[...new Set(REACH_DATA.map(r=>r.sec))];
  const fQ=S.reachQ||'';
  const filtered=REACH_DATA.filter(r=>(!fQ||r.name.toLowerCase().includes(fQ.toLowerCase())||r.sec.toLowerCase().includes(fQ.toLowerCase())));

  const byFabi=REACH_DATA.filter(r=>r.med.includes('Fabiana')).length;

  // th helper
  const TH=(lbl,w,c,bg)=>`<th style="padding:9px 12px;text-align:center;font-size:10px;font-family:'Quicksand',sans-serif;letter-spacing:.15em;text-transform:uppercase;color:${c};width:${w};${bg?'background:'+bg:''}white-space:nowrap">${lbl}</th>`;

  return `
  <div class="filter-bar">
    <input placeholder="🔍 Buscar atividade Reach..." value="${e(fQ)}" data-a="reachQ">
    ${fQ?`<button class="btn btn-red btn-sm" data-a="clearRQ">✕ Limpar</button>`:''}
    <span class="filter-count">${filtered.length} atividade${filtered.length!==1?'s':''}</span>
  </div>
  <div class="main-content"><div class="container">

      const rows=filtered.filter(r=>r.sec===sec);
      if(!rows.length) return '';
      return `
      <div class="sc" style="margin-bottom:18px">
        <div class="sc-title" style="margin-bottom:14px">${e(sec)}
          <span style="font-size:11px;font-family:'Quicksand',sans-serif;color:#94a3b8;font-weight:400;letter-spacing:.1em">${rows.length} item${rows.length!==1?'s':''}</span>

        <div style="overflow-x:auto">

            <thead><tr style="background:#f8fafc;border-bottom:2px solid #e2e8f0">
              <th style="padding:9px 12px;text-align:left;font-size:10px;font-family:'Quicksand',sans-serif;letter-spacing:.15em;text-transform:uppercase;color:#94a3b8">Atividade</th>
              ${TH('Owner',   '82px', '#94a3b8', '')}
              ${TH('Data',    '62px', '#94a3b8', '')}
              ${TH('Resp. MED', '115px', '#6d28d9', '#faf5ff')}
              ${TH('Resp. MKT', '115px', '#15803d', '#f0fdf4')}
              ${TH('Resp. OCE', '115px', '#b45309', '#fffbeb')}
            </tr></thead>
            <tbody>
              ${rows.map((r,i)=>`
              <tr style="border-bottom:1px solid #f1f5f9;background:${i%2?'#fafafa':'#fff'};transition:background .12s" onmouseover="this.style.background='#f0f4ff'" onmouseout="this.style.background='${i%2?'#fafafa':'#fff'}'">

                <td style="padding:6px 10px;text-align:center;background:#faf5ff">${rdropdown(r.id,'med',r.med,MED_OPTS)}</td>

    }).join('')}
  </div></div>`;
}

function tagCell(rowId, field, tags, textColor, bgColor){
  const uid = `tc_${rowId}_${field}`;
  return `<div style="display:flex;flex-wrap:wrap;gap:4px;align-items:center;min-height:28px">
    ${tags.map((t,ti)=>`
      <span style="display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:99px;font-size:11px;font-weight:600;background:${bgColor};color:${textColor};border:1px solid ${textColor}22">
        ${e(t)}
        <span data-a="removeTag" data-rid="${rowId}" data-f="${field}" data-ti="${ti}" style="cursor:pointer;font-size:12px;opacity:.5;line-height:1;padding:0 1px" title="Remover">×</span>
      </span>`).join('')}
    <input id="${uid}" placeholder="+ nome" data-a="tagInput" data-rid="${rowId}" data-f="${field}"
      style="border:none;background:transparent;font-size:11px;font-family:'Nunito',sans-serif;color:${textColor};outline:none;width:60px;min-width:40px;padding:3px 4px;opacity:.6"
      onkeydown="if(event.key==='Enter'||event.key===','){event.preventDefault();window._addTag('${rowId}','${field}',this)}"
      onfocus="this.style.opacity='1';this.style.borderBottom='1px solid ${textColor}'"
      onblur="this.style.opacity='.6';this.style.borderBottom='none';if(this.value.trim())window._addTag('${rowId}','${field}',this)">
  </div>`;
}

// Global tag helpers (called from inline handlers)
window._addTag = function(rowId, field, input){
  const val = input.value.trim().replace(/,$/,'');
  if(!val) return;
  const allData = [...STAFF_DATA, ...STAFF_EVENTOS];
  const row = allData.find(r=>r.id===rowId);
  if(!row) return;

};

// PERSISTÊNCIA LOCAL — localStorage
// Salva automaticamente no browser de cada usuário
// ═══════════════════════════════════════════════════════════
const LS_KEY = 'medreach2026_v1';

function lsSave(){
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({
      todos:     TODO_ITEMS,
      checklist: checklistItems.map(i=>({id:i.id, status:i.status, notes:i.notes||''})),
      lives:     liveTasks.map(t=>({id:t.id, status:t.status})),
      budget:    budgetLines.map(l=>({id:l.id, q1:l.q1, q2:l.q2, q3:l.q3, q4:l.q4, real:l.real})),
      savedAt:   new Date().toISOString()
    }));
  } catch(e){ console.warn('localStorage save error:', e); }
}

function lsLoad(){
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return;
    const data = JSON.parse(raw);

    if(data.todos?.length)
      TODO_ITEMS = data.todos;

    if(data.checklist?.length)
      checklistItems = checklistItems.map(i=>{
        const s = data.checklist.find(x=>x.id===i.id);
        return s ? {...i, status:s.status, notes:s.notes||i.notes} : i;
      });

    if(data.lives?.length)
      liveTasks = liveTasks.map(t=>{
        const s = data.lives.find(x=>x.id===t.id);
        return s ? {...t, status:s.status} : t;
      });

    if(data.budget?.length)
      budgetLines = budgetLines.map(l=>{
        const s = data.budget.find(x=>x.id===l.id);
        return s ? {...l, q1:s.q1, q2:s.q2, q3:s.q3, q4:s.q4, real:s.real} : l;
      });

  } catch(e){ console.warn('localStorage load error:', e); }
}

// Carrega dados salvos e renderiza
lsLoad();
render();
